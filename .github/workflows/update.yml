name: Update News Data

on:
  workflow_dispatch: # Allows your Cloudflare Worker to trigger this run

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Run Your News Fetcher
        run: |
          # This executes your python script or curl command to generate news.json
          python fetch_news.py 

      - name: Push Updates to Main Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adds your index.html, .nojekyll, and news.json
          git add .
          
          # Only commits and pushes if files have actually changed
          git diff-index --quiet HEAD || (git commit -m "Automated news update" && git push origin main)
