name: Update News Payload

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows you to run this manually anytime

# Permissions required to push code changes AND deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Prevents multiple concurrent deployments from clashing
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-payload:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run payload update script
      run: python main.py

    - name: Check in Fresh Payload
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        touch .nojekyll
        git add .nojekyll news.json
        if ! git diff --staged --quiet; then
          git commit -m "Automated payload update"
          git push origin main
        else
          echo "No changes detected in news.json"
        fi

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Uploads your entire root directory (index.html, news.json, etc.)

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
